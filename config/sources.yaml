max_news_age_hours: 48
initial_backfill_enabled: false
initial_backfill_days: 7
future_tolerance_hours: 6

google_news:
  enabled: true
  language: es
  country: ES
  max_results_per_query: 10
  timeout_seconds: 15
  pause_seconds: 1

additional_rss:
