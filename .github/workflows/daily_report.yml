name: Daily opportunity report

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. The time gate below keeps the intended run at 10:17 Europe/Madrid.
    - cron: "17 8 * * *"
    - cron: "17 9 * * *"

concurrency:
  group: daily-opportunity-report
  cancel-in-progress: false

jobs:
  run-report:
    runs-on: ubuntu-latest

    env:
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SCHEDULE_EXPRESSION: ${{ github.event.schedule }}

    steps:
      - name: Check Spain time window
        id: time_gate
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          is_manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          now = datetime.now(ZoneInfo("Europe/Madrid"))
          schedule_expression = os.environ.get("SCHEDULE_EXPRESSION", "")
          scheduled_utc_hours = {
              "17 8 * * *": 8,
              "17 9 * * *": 9,
          }
          scheduled_spain_time = ""
          should_run = is_manual

          if not should_run and schedule_expression in scheduled_utc_hours:
              scheduled_utc = datetime(
                  now.year,
                  now.month,
                  now.day,
                  scheduled_utc_hours[schedule_expression],
                  17,
                  tzinfo=timezone.utc,
              )
              scheduled_spain = scheduled_utc.astimezone(ZoneInfo("Europe/Madrid"))
              scheduled_spain_time = scheduled_spain.isoformat(timespec="seconds")
              should_run = scheduled_spain.hour == 10 and scheduled_spain.minute == 17

          print(f"should_run={str(should_run).lower()}")
          print(f"spain_time={now.isoformat(timespec='seconds')}")
          print(f"scheduled_spain_time={scheduled_spain_time}")
          PY

      - name: Show skipped run
        if: steps.time_gate.outputs.should_run != 'true'
        run: echo "Skipped. Spain time is ${{ steps.time_gate.outputs.spain_time }}. Scheduled Spain time was ${{ steps.time_gate.outputs.scheduled_spain_time }}"

      - name: Check out repository
        if: steps.time_gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.time_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.time_gate.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore local history cache
        if: steps.time_gate.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            data/opportunities.csv
            data/sources_catalog.xlsx
          key: opportunities-history-${{ github.run_id }}
          restore-keys: |
            opportunities-history-

      - name: Run report and send email
        if: steps.time_gate.outputs.should_run == 'true'
        run: python main.py

      - name: Upload generated report
        if: steps.time_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: |
            reports/*.html
            data/opportunities.csv
            data/sources_catalog.xlsx
          if-no-files-found: warn
